<dialog #dialog class="user-dialog" closedby="any" (cancel)="onCancel($event)"
    (animationend)="animationFinished($event)">
    <div class="dialog-content">
        <div class="dialog-wrapper-inner">
            <div class="dialog-left">
                <div class="dialog-left-inner">
                    <div class="dialog-logo">
                        <img class="dialog-logo-img" src="/assets/img/logo/logo-join-white.svg" alt="Join Logo" />
                    </div>
                    <h2 class="dialog-headline">
                        @if (isEditMode()) {
                        Edit contact
                        } @else {
                        Add Contact
                        }

                    </h2>
                    <h3 class="dialog-subline">Tasks are better with a team!</h3>
                    <div class="dialog-headline-stroke"></div>
                </div>
            </div>
            <div class="dialog-right">
                <div class="dialog-user-close">
                    <button type="button" class="dialog-close-btn" (click)="closeDialog()">
                    </button>
                </div>
                <div class="dialog-right-inner-right">
                    <div class="right-user-form">
                        <div class="dialog-user-logo">
                            @if (isEditMode()) {
                            @if (selectedContact(); as contact) {
                            <div class="contact-details__avatar" [style.background-color]="contact.colors">
                                {{ contact.initials }}
                            </div>
                            }
                            } @else {
                            <img src="/assets/img/forms/empty-user.svg" alt="User">
                            }

                        </div>
                        <div class="dialog-form">
                            <form [formGroup]="addTaskForm" (ngSubmit)="onSubmit()">
                                <div class="form-cell">
                                    <div>
                                        <input id="name" class="input-name" type="text" name="name"
                                            formControlName="name" placeholder="Name" />
                                    </div>
                                    <div class="form-error-placeholder">
                                        <!-- @if (titel.touched) {

                                        @if (name.hasError('required')) {
                                        <p class="form-error">This field is required.</p>

                                        } @else if (name.hasError('fullName')) {
                                        <p class="form-error">Enter first and last name.</p>

                                        } @else if (name.hasError('nameTooShort')) {
                                        <p class="form-error">
                                            First and last name must each contain at least 3 characters.
                                        </p>
                                        }
                                        @else if (name.hasError('nameExists')) {
                                        <p class="form-error">
                                            Contact already exists.
                                        </p>
                                        }
                                        @else if (name.hasError('pattern')){
                                        <p class="form-error">
                                            The name must not contain numbers.
                                        </p>
                                        }
                                        } -->
                                    </div>
                                </div>
                                <div class="form-cell">
                                    <div>
                                        <input id="mail" class="input-mail" type="text" name="mail"
                                            formControlName="email" placeholder="Email" />
                                    </div>
                                    <div class="form-error-placeholder">
                                        <!-- @if (email.touched) {
                                        @if ( email.hasError('required')) {
                                        <p class="form-error">
                                            Your email is required.
                                        </p>
                                        }
                                        @else if ( email.hasError('email')) {
                                        <p class="form-error">
                                            Wrong email address.
                                        </p>
                                        }
                                        } -->
                                    </div>
                                </div>
                                <div class="form-cell">
                                    <div>
                                        <input id="phone" class="input-phone" name="phone" type="text"
                                            formControlName="phone" placeholder="Phone" />
                                    </div>
                                    <div class="form-error-placeholder">
                                        <!-- @if (phone.touched) {
                                        @if (phone.hasError('required')) {
                                        <p class="form-error">
                                            Your phone number is required.
                                        </p>
                                        }
                                        @else if (phone.hasError('pattern')){
                                        <p class="form-error">
                                            The phone number can only contain numbers.
                                        </p>
                                        }

                                        } -->
                                    </div>
                                </div>

                                <div class="form-buttons">
                                    @if (isEditMode()) {
                                    <button class="btn-primary btn-primary--border" type="button"
                                        (click)="onRemoveSelectedContact()">
                                        Delete
                                    </button>
                                    } @else {
                                    <button class="btn-primary btn-primary--border btn-primary--hide" type="button"
                                        (click)="closeDialog()">
                                        Cancel
                                    </button>
                                    }

                                    <button class="btn-primary btn-primary--create btn-primary--mobil" type="submit"
                                        [disabled]="addTaskForm.invalid">
                                        @if (isEditMode()) {
                                        Save
                                        } @else {
                                        Create contact
                                        }
                                    </button>
                                </div>
                            </form>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
</dialog>
