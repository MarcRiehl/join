<p>contact-details works!</p>

@if (contact()) {
  <h2>{{ contact()?.firstname }} {{ contact()?.lastname }}</h2>
  <p>{{ contact()?.email }}</p>
  <p>{{ contact()?.phone }}</p>
} @else {}

<!-- Ablauf

1. Contacts lädt alle Kontakte.
2. ContactList zeigt alle Kontakte an.
3. Du klickst in ContactList auf einen Kontakt.
4. ContactList sendet den geklickten Kontakt per output() nach oben.
5. Contacts speichert diesen Kontakt als selectedContact.
6. Contacts gibt selectedContact per input() an ContactDetail weiter. -->
