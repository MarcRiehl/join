<section class="contact-details">
  <header class="contact-details__header">
    <h1>Contact <span class="contact-details__separator">|</span></h1>
    <h2>Better with a team</h2>
  </header>
  <div>
    @if (contact()) {
      <h2>{{ contact()?.firstname }} {{ contact()?.lastname }}</h2>
      <p>{{ contact()?.email }}</p>
      <p>{{ contact()?.phone }}</p>
    } @else {}
  </div>
</section>
