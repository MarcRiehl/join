<div class="contact-list-container">
  <div class="add-contact-wrapper desktop-only">
    <button class="btn-primary btn-primary--list" type="button" (click)="openDialog()">
      <span>Add new contact</span>
      <img src="assets/img/components/contacts/person-add.svg" alt="">
    </button>
  </div>

  <button class="btn-mobile-add" type="button" (click)="openDialog()">
    <img src="assets/img/components/contacts/person-add.svg" alt="">
  </button>

  <div class="contacts-scroll-area">
    @for (group of groupedContacts; track group.letter) {
    <div class="contact-group">
      <div class="group-header">{{ group.letter }}</div>
      <div class="group-divider"></div>
      <div class="group-items">
        @for (contact of group.contacts; track contact.id) {
        <div class="contact-item" [class.active]="selectedContact()?.id === contact.id" (click)="onSelectContact(contact)">
          <div class="contact-avatar" [style.background-color]="contact.colors">
            {{ contact.initials }}
          </div>
          <div class="contact-info">
            <span class="contact-name">{{ contact.firstname }} {{ contact.lastname }}</span>
            <span class="contact-email">{{ contact.email }}</span>
          </div>
        </div>
        }
      </div>
    </div>
    }
  </div>
</div>
