<button (click)="openNewUser()">Add New User</button>

@for (contact of contacts(); track contact.id) {
  <div (click)="selectedContact(contact)">
    <p>{{ contact.firstname }}</p>
    <p>{{ contact.lastname }}</p>
    <p>{{ contact.email }}</p>
    <p>{{ contact.phone }}</p>
  </div>
}
