<section class="contacts__main" [class.contacts__main--detail-open]="selectedContact()">
  <app-contact-list
    [contacts]="contacts()"
    (contactSelected)="selectContact($event)"
  ></app-contact-list>

  <section class="contacts__details">
    <app-contact-details
      [contact]="selectedContact()"
      (removeSelectedContact)="clearSelectedContact()"
    ></app-contact-details>
  </section>
</section>

@if (dialogService.current().type === DialogType.Contact) {
  <app-contact-dialog />
}
