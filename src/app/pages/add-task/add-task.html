<section class="add-tasks">
  <header class="add-tasks__header">
    <h1 class="add-tasks__title">Add Task</h1>
  </header>

  <form [formGroup]="addTaskForm" class="add-tasks__form" (ngSubmit)="onSubmit()">
    <div class="add-tasks__column-left">
      <label class="form-label" for="title">Title</label>
      <input type="text" formControlName="title" placeholder="Enter a title" />
      <label class="form-label" for="description">Description</label>
      <input type="text" formControlName="description" placeholder="Enter a Description" />
      <label class="form-label" for="dueDate">Due Date</label>
      <input
        type="date"
        formControlName="dueDate"
        [class.input-error]="dueDateControl?.invalid && dueDateControl?.touched"
      />
      <div class="error-space">
        @if (dueDateControl?.invalid && dueDateControl?.touched) {
          <span class="error-message">This field is required</span>
        }
      </div>
    </div>

    <div class="add-tasks__column-right">
      <div class="proirity-wrapper">
        <label class="form-label" for="priority">Priority</label>
        <button
          type="button"
          [class.active-urgent]="isPrioritySelected('urgent')"
          (click)="setPriority('urgent')"
        >
          Urgent
        </button>

        <button
          type="button"
          [class.active-medium]="isPrioritySelected('medium')"
          (click)="setPriority('medium')"
        >
          Medium
        </button>

        <button
          type="button"
          [class.active-low]="isPrioritySelected('low')"
          (click)="setPriority('low')"
        >
          Low
        </button>
      </div>

      <div class="assign-wrapper">
        <label class="form-label">Assigned to</label>
        <app-assigned-to
          (selectedContactsChange)="onAssignedContactsChange($event)"
        ></app-assigned-to>
      </div>

      <label class="form-label">Category</label>
      <div class="category-wrapper">
        <div class="category-field" (click)="toggleCategoryDropdown()">
          <input
            type="text"
            class="category-dropdown__input"
            [value]="getCategoryLabel()"
            placeholder="Select task category"
            readonly
          />
          <span
            class="category-dropdown__arrow"
            [class.category-dropdown__arrow--open]="isCategoryDropdownOpen"
            >▾</span
          >
        </div>
        @if (isCategoryDropdownOpen) {
          <div class="category-dropdown__list">
            @for (cat of categories; track cat.value) {
              <div (click)="setCategory(cat.value)">{{ cat.label }}</div>
            }
          </div>
        }
      </div>

      <app-subtasks (subtasksChange)="onSubtasksChange($event)"></app-subtasks>
    </div>

    <div class="form-footer">
      <span class="required-legend">*This field is required</span>
      <div class="form-buttons">
        <button type="button" class="btn-clear" (click)="onClear()">Clear ✕</button>
        <button type="submit" class="btn-create" [disabled]="isSaving || addTaskForm.invalid">
          Create Task ✓
        </button>
      </div>
    </div>
  </form>
</section>
