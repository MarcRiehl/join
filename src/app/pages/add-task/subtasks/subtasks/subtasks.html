<div class="subtasks">
  <label class="subtasks__label">Subtasks</label>

  <div class="subtasks__input-row">
    <input
      type="text"
      class="subtasks__input"
      placeholder="Add new subtask"
      [value]="newSubtaskTitle()"
      (input)="onInputChange($any($event.target).value)"
      (keydown.enter)="$event.preventDefault(); addSubtask()"
    />
    @if (newSubtaskTitle()) {
      <button type="button" class="subtasks__icon-clear" (click)="clearInput()">
        <!-- icon: general/close.svg + close-hover.svg -->
      </button>
      <button type="button" class="subtasks__icon-add" (click)="addSubtask()">
        <!-- icon: components/task/task-check.svg + task-check-hover.svg -->
      </button>
    }
  </div>

  <ul class="subtasks__list">
    @for (subtask of subtasks(); track $index) {
      <li class="subtasks__item">
        @if (editingIndex() === $index) {
          <input
            type="text"
            class="subtasks__edit-input"
            [value]="editingTitle()"
            (input)="onEditInputChange($any($event.target).value)"
            (keydown.enter)="$event.preventDefault(); saveEdit($index)"
          />
          <button type="button" class="subtasks__icon-delete" (click)="deleteSubtask($index)">
            <!-- icon: general/delete.svg + delete-hover.svg -->
          </button>
          <button type="button" class="subtasks__icon-confirm" (click)="saveEdit($index)">
            <!-- icon: components/task/task-check.svg + task-check-hover.svg -->
          </button>
        } @else {
          <span class="subtasks__item-title" (dblclick)="startEdit($index)">
            {{ subtask.title }}
          </span>
          <button type="button" class="subtasks__icon-edit" (click)="startEdit($index)">
            <!-- icon: general/edit.svg + edit-hover.svg -->
          </button>
          <button type="button" class="subtasks__icon-delete" (click)="deleteSubtask($index)">
            <!-- icon: general/delete.svg + delete-hover.svg -->
          </button>
        }
      </li>
    }
  </ul>
</div>
